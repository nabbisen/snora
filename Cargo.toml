[workspace]
members = [
    "crates/snora-core",
    "crates/snora",
    "examples/hello",
    "examples/skeleton",
    "examples/toast",
    "examples/dialog",
    "examples/bottom_sheet",
    "examples/context_menu",
    "examples/header_menu",
    "examples/multi_view",
    "examples/rtl",
]
resolver = "2"

[workspace.package]
authors       = ["nabbisen <nabbisen@scqr.net>"]
license       = "Apache-2.0"
categories    = ["gui", "development-tools", "accessibility", "asynchronous"]
repository    = "https://github.com/nabbisen/snora"
readme        = "README.md"

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1

[profile.dev]
opt-level = 1
lto = false
incremental = false

[workspace.dependencies]
iced = { version = "0.14", features = ["canvas", "svg", "tokio"] }
lucide-icons = { version = "0", features = ["iced"] }
