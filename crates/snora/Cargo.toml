[package]
name        = "snora"
version = "0.4.1"
edition     = "2024"

description             = "iced engine for the Snora GUI framework. Consumes snora-core vocabulary."
authors.workspace       = true
license.workspace       = true
categories.workspace    = true
keywords                = ["iced", "gui", "framework", "layout", "widget"]
repository.workspace    = true
readme.workspace        = true

[features]
default = []
lucide-icons = ["snora-core/lucide-icons", "dep:lucide-icons"]
svg-icons = ["snora-core/svg-icons", "iced/svg"]

[dependencies]
snora-core = { path = "../snora-core", version = "0.4" }
iced = { workspace = true }
lucide-icons = { workspace = true, optional = true }
