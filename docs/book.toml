[book]
title = "Snora"
description = "An iced GUI framework that gets out of the way of your application."
authors = ["nabbisen <nabbisen@scqr.net>"]
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/nabbisen/snora"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/nabbisen/snora/edit/main/docs/{path}"
site-url = "/snora/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 2

[output.html.print]
enable = true
